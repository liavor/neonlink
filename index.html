<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Link | Gamer Cyberpunk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --bg-dark: #05010a; /* Tam karanlık void */
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055; /* Cyberpunk neon pembe/kırmızı */
            --neon-purple: #b026ff; /* Ağır Cyberpunk Moru */
            --grid-color: rgba(176, 38, 255, 0.08); /* Mor grid */
            --panel-bg: rgba(10, 2, 20, 0.85); /* Daha opak, arkası sızdırmaz */
        }

        html, body {
            background-color: var(--bg-dark); /* BEYAZ SIRITMAYI KESİN OLARAK ÖNLER */
            height: 100%;
            margin: 0;
        }

        body {
            background: radial-gradient(circle at top, #150524 0%, var(--bg-dark) 80%);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            color: #fff;
            
            /* Janjanlı Glowing Grid */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }

        /* Daha Parlak Gamer Glow Efektleri */
        .neon-border-cyan {
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4), inset 0 0 10px rgba(0, 243, 255, 0.2);
        }
        
        .neon-border-pink {
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5), inset 0 0 15px rgba(255, 0, 85, 0.2);
        }

        .gamer-gradient-text {
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 8px rgba(176, 38, 255, 0.4));
        }

        .cyber-btn {
            background: linear-gradient(45deg, rgba(176, 38, 255, 0.15), rgba(0, 243, 255, 0.15));
            border: 2px solid var(--neon-purple);
            color: #e0b3ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(176, 38, 255, 0.2);
        }

        .cyber-btn:hover {
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
            border-color: #fff;
            color: #05010a;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
            transform: scale(1.02);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 243, 255, 0.05);
        }

        .online-dot {
            width: 10px; height: 10px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 243, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 243, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 243, 255, 0); }
        }

        .spinner {
            border: 3px solid rgba(176, 38, 255, 0.2);
            border-top: 3px solid var(--neon-purple);
            border-radius: 50%;
            width: 24px; height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* AĞIR CRT EFEKTİ & HAREKETLİ TARAMA ÇİZGİSİ */
        .crt-overlay {
            position: fixed;
            inset: 0;
            z-index: 50; /* Z-INDEX 50! Chat kısmı 60 yapılarak bu katmandan kurtarılacak. */
            pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%),
                radial-gradient(circle at center, transparent 50%, rgba(0, 0, 0, 0.6) 100%);
            background-size: 100% 4px, 100% 100%;
            animation: crtFlicker 0.15s infinite;
        }

        /* Yukardan aşağı inen tarama çizgisi */
        .crt-overlay::after {
            content: "";
            display: block;
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 15vh; /* Kalınlık */
            background: linear-gradient(to bottom, rgba(176,38,255,0), rgba(176,38,255,0.25), rgba(176,38,255,0));
            animation: crtDropLine 6s linear infinite;
        }

        @keyframes crtDropLine {
            0% { transform: translateY(-20vh); }
            100% { transform: translateY(120vh); }
        }

        @keyframes crtFlicker {
            0% { opacity: 0.9; }
            50% { opacity: 0.95; }
            100% { opacity: 0.9; }
        }

        /* RGB Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #05010a; border-left: 1px solid rgba(0, 243, 255, 0.1); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-pink)); border-radius: 4px; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Global Ağır CRT Overlay & Hareketli Tarama Çizgisi -->
    <div class="crt-overlay"></div>

    <!-- Giriş Ekranı (CRT altında kalması için z-index olmadan veya düşük değerle bırakıldı) -->
    <div id="login-screen" class="w-full max-w-md relative">
        <div class="glass-panel p-8 rounded-2xl border-t-4 border-t-[#b026ff] border-b-4 border-b-[#00f3ff] shadow-[0_0_40px_rgba(176,38,255,0.15)] relative overflow-hidden">
            
            <!-- Arkaplan RGB Parlaması -->
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-[#00f3ff] rounded-full mix-blend-screen filter blur-[80px] opacity-40"></div>
            <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-[#b026ff] rounded-full mix-blend-screen filter blur-[80px] opacity-30"></div>

            <h1 class="cyber-font text-5xl mb-2 tracking-widest text-center relative z-10">
                <span class="gamer-gradient-text">NEON</span><span class="text-[#ff0055] drop-shadow-[0_0_8px_rgba(255,0,85,0.8)]">LINK</span>
            </h1>
            <p class="text-center text-[#b026ff] text-sm tracking-[0.1em] mb-8 opacity-90 font-bold drop-shadow-[0_0_5px_#b026ff] relative z-10">Safe and Simple. For Real Gamers.</p>
            
            <div class="space-y-6 mb-8 relative z-10">
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-[#00f3ff] cyber-font text-sm">ID</span>
                    <input type="text" id="nick-input" placeholder="Oyuncu Adı" 
                        class="w-full bg-[#05010a] border-2 border-[#00f3ff]/40 rounded-xl text-[#00f3ff] px-12 py-3.5 focus:outline-none focus:border-[#00f3ff] focus:shadow-[0_0_15px_rgba(0,243,255,0.5)] font-bold uppercase tracking-wider transition-all placeholder-[#00f3ff]/30">
                </div>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-[#ff0055] cyber-font text-sm">ODA</span>
                    <input type="text" id="room-input" placeholder="Oda Adı" 
                        class="w-full bg-[#05010a] border-2 border-[#ff0055]/40 rounded-xl text-[#ff0055] px-12 py-3.5 focus:outline-none focus:border-[#ff0055] focus:shadow-[0_0_15px_rgba(255,0,85,0.5)] font-bold uppercase tracking-wider transition-all placeholder-[#ff0055]/30">
                </div>

            <button id="join-btn" class="cyber-btn w-full py-4 rounded-xl cyber-font text-lg font-bold flex items-center justify-center gap-3 relative z-10">
                <span id="btn-text">LOBİYE KATIL</span>
                <div id="btn-loader" class="spinner hidden"></div>
            </button>
        </div>
    </div>

    <!-- Ana Uygulama Ekranı -->
    <div id="chat-screen" class="hidden w-full max-w-6xl h-[90vh] flex flex-col shadow-[0_0_50px_rgba(0,243,255,0.15)] rounded-2xl overflow-hidden relative">
        
        <!-- Üst Bar -->
        <div class="glass-panel p-5 flex justify-between items-center border-b-2 border-[#b026ff]/50 bg-gradient-to-r from-[rgba(176,38,255,0.1)] to-[rgba(0,243,255,0.1)] relative">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-[#05010a] rounded-xl border-2 border-[#00f3ff] flex items-center justify-center text-[#00f3ff] text-3xl shadow-[0_0_15px_rgba(0,243,255,0.4)]">
                    🎮
                </div>
                <div>
                    <h2 id="display-nick" class="cyber-font text-xl text-[#b026ff] tracking-wider drop-shadow-[0_0_5px_rgba(176,38,255,0.5)]">USER_NAME</h2>
                    <p id="display-room" class="text-sm text-[#00f3ff] font-bold uppercase tracking-[0.2em] drop-shadow-[0_0_5px_rgba(0,243,255,0.5)]">ODA: BOŞ</p>
                </div>
            </div>
            <div class="flex gap-4">
                
                <!-- Davet Linki Kopyalama Butonu -->
                <button id="share-btn" title="Davet Linkini Kopyala" class="w-14 h-14 flex items-center justify-center rounded-xl bg-[#05010a] hover:bg-[#b026ff]/20 border-2 border-[#b026ff]/50 transition-all text-[#b026ff] shadow-[0_0_10px_rgba(176,38,255,0.2)] relative z-10">
                    <span id="share-icon" class="text-2xl">🔗</span>
                </button>

                <!-- YENİ: Dipses (Gürültü Engelleme) Filtresi -->
                <button id="noise-filter-btn" title="Dipses Filtresi (Açık)" class="w-14 h-14 flex items-center justify-center rounded-xl bg-[#05010a] hover:bg-[#00f3ff]/20 border-2 border-[#00f3ff]/50 transition-all text-[#00f3ff] shadow-[0_0_10px_rgba(0,243,255,0.2)] relative z-10 group">
                    <span class="text-2xl group-hover:animate-pulse">🌊</span>
                    <!-- Açık olduğunu belli eden minik mavi bildirim ışığı -->
                    <div id="noise-indicator" class="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-[#00f3ff] rounded-full shadow-[0_0_8px_#00f3ff] border border-[#05010a]"></div>
                </button>

                <button id="mute-btn" title="Mikrofonu Kapat/Aç" class="w-14 h-14 flex items-center justify-center rounded-xl bg-[#05010a] hover:bg-[#00f3ff]/20 border-2 border-[#00f3ff]/50 transition-all text-[#00f3ff] shadow-[0_0_10px_rgba(0,243,255,0.2)] relative z-10">
                    <span id="mute-icon" class="text-2xl">🎙️</span>
                </button>

                <button onclick="location.reload()" title="Odadan Ayrıl" class="w-14 h-14 flex items-center justify-center rounded-xl bg-[#05010a] hover:bg-[#ff0055]/30 border-2 border-[#ff0055]/50 transition-all text-[#ff0055] shadow-[0_0_10px_rgba(255,0,85,0.2)] relative z-10">
                    <span class="text-2xl">🔌</span>
                </button>
            </div>
        </div>

        <div class="flex-1 flex overflow-hidden">
            <!-- Sol Menü: Bağlı Kullanıcılar -->
            <div class="w-64 glass-panel p-6 overflow-y-auto border-r border-[#00f3ff]/20 hidden md:block bg-[#05010a]/60 relative">
                <h3 class="cyber-font text-sm text-[#b026ff] mb-6 tracking-[0.2em] pb-3 border-b border-[#b026ff]/30 drop-shadow-[0_0_5px_rgba(176,38,255,0.5)]">OYUNCULAR</h3>
                <ul id="user-list" class="space-y-5">
                    <!-- Dinamik Liste -->
                </ul>
            </div>

            <!-- Sağ Alan Wrapper -->
            <div class="flex-1 flex flex-col overflow-hidden relative bg-[#05010a]/40">
                
                <!-- Sesli Sohbet Izgarası -->
                <div class="flex-1 p-6 overflow-y-auto relative glass-panel border-b-0 rounded-b-none">
                    <div id="voice-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-6 relative z-10">
                        <!-- Ses Kutuları -->
                    </div>
                    <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center opacity-40 pointer-events-none">
                        <div class="text-9xl mb-6 text-[#b026ff] drop-shadow-[0_0_25px_rgba(176,38,255,0.6)] animate-pulse">🌌</div>
                        <p class="cyber-font text-lg text-[#b026ff] tracking-widest drop-shadow-[0_0_5px_rgba(176,38,255,0.8)]">LOBİDE BAŞKA KİMSE YOK...</p>
                    </div>
                </div>

                <!-- Yazılı Sohbet Alanı -->
                <div class="h-64 bg-[#05010a] border-t-2 border-[#00f3ff]/40 flex flex-col relative z-[60] shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
                    
                    <div id="chat-messages" class="flex-1 p-5 overflow-y-auto flex flex-col gap-4 font-mono text-sm z-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMCwgMjQzLCAyNTUsIDAuMDUpIi8+PC9zdmc+')]">
                        <div class="text-[#b026ff] text-sm font-bold opacity-90 mb-2 font-mono uppercase tracking-wider drop-shadow-[0_0_5px_rgba(176,38,255,0.4)]">> SİSTEM: Odaya giriş yapıldı. Güvenli bağlantı aktif.</div>
                        <div class="text-[#00f3ff] text-sm font-bold opacity-90 mb-2 font-mono uppercase tracking-wider drop-shadow-[0_0_5px_rgba(0,243,255,0.4)]">> SİSTEM: Donanımsal gürültü filtresi (dipses) standart olarak aktif. Sesiniz temizleniyor...</div>
                    </div>
                    
                    <div class="p-4 bg-[#080210] border-t border-[#ff0055]/30 flex gap-3 items-center z-10">
                        <span class="text-[#b026ff] font-bold text-lg">></span>
                        <input type="text" id="chat-input" placeholder="Mesaj gönder..." 
                            class="flex-1 bg-[#05010a] text-white px-4 py-3 rounded-lg border border-[#00f3ff]/30 focus:border-[#b026ff] focus:outline-none font-medium placeholder-white/30 focus:shadow-[0_0_15px_rgba(176,38,255,0.2)] transition-all">
                        <button id="chat-send-btn" class="bg-gradient-to-r from-[#b026ff] to-[#ff0055] hover:opacity-80 text-[#05010a] font-black px-8 py-3 rounded-lg transition-all cyber-font text-sm tracking-widest shadow-[0_0_15px_rgba(176,38,255,0.4)]">
                            GÖNDER
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- PeerJS WebRTC -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        // --- URL'DEN ODA ADINI OTOMATİK ÇEKME ---
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roomFromUrl = urlParams.get('room');
            if (roomFromUrl) {
                document.getElementById('room-input').value = roomFromUrl;
                document.getElementById('nick-input').focus();
            }
        });

        // Global Değişkenler
        let myPeer, myStream, myNick, roomName;
        let isHost = false;
        let peers = {}; 
        
        let hostDataConnections = []; 
        let myHostDataConnection = null; 

        let roomClients = []; 
        let isMuted = false;
        let isNoiseFilterActive = true; // YENİ: Dipses filtresi durumu

        // UI Elementleri
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const joinBtn = document.getElementById('join-btn');
        const userListUI = document.getElementById('user-list');
        const voiceGridUI = document.getElementById('voice-grid');
        const emptyState = document.getElementById('empty-state');
        const muteBtn = document.getElementById('mute-btn');
        const shareBtn = document.getElementById('share-btn');
        const noiseFilterBtn = document.getElementById('noise-filter-btn'); // YENİ
        const noiseIndicator = document.getElementById('noise-indicator'); // YENİ
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send-btn');
        const chatMessages = document.getElementById('chat-messages');

        // GİRİŞ İŞLEMİ VE MİKROFON İZİNLERİ
        joinBtn.onclick = async () => {
            myNick = document.getElementById('nick-input').value.trim();
            const roomInput = document.getElementById('room-input').value.trim();

            if (!myNick || !roomInput) return alert("HATA: Oyuncu Adı veya Oda Adı eksik!");
            
            document.getElementById('btn-text').classList.add('hidden');
            document.getElementById('btn-loader').classList.remove('hidden');

            roomName = 'neon-net-' + roomInput.toLowerCase().replace(/\s+/g, '-');

            try {
                // YENİ: constraints kısmı güncellendi. Artık donanımsal dipses/yankı engelleme tam güçle devrede.
                myStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        noiseSuppression: true,
                        echoCancellation: true,
                        autoGainControl: true
                    }, 
                    video: false 
                });
                initPeerAsHost();
            } catch (err) {
                alert("SİSTEM HATASI: Mikrofona erişilemedi!");
                resetBtn();
            }
        };

        function resetBtn() {
            document.getElementById('btn-text').classList.remove('hidden');
            document.getElementById('btn-loader').classList.add('hidden');
        }

        // --- ADIM 1: HOST MANTIĞI ---
        function initPeerAsHost() {
            myPeer = new Peer(roomName);

            myPeer.on('open', (id) => {
                isHost = true;
                setupUI();
                listenForClients(); 
            });

            myPeer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    myPeer.destroy();
                    initPeerAsClient();
                } else {
                    alert("AĞ HATASI: " + err.message);
                    resetBtn();
                }
            });
        }

        // --- ADIM 2: CLIENT MANTIĞI ---
        function initPeerAsClient() {
            myPeer = new Peer(); 

            myPeer.on('open', (id) => {
                isHost = false;
                setupUI();

                myHostDataConnection = myPeer.connect(roomName);
                
                myHostDataConnection.on('open', () => {
                    myHostDataConnection.send({ type: 'join', id: id, nick: myNick });
                });

                myHostDataConnection.on('data', (data) => {
                    if (data.type === 'peer-list') {
                        data.peers.forEach(p => makeCall(p.id, p.nick));
                    }
                    if (data.type === 'chat') {
                        appendChatMessage(data.sender, data.text);
                    }
                });

                makeCall(roomName, "ODA KURUCUSU");
                listenForCalls();
            });
        }

        // --- ADIM 3: HOST VERİ DİNLEYİCİSİ ---
        function listenForClients() {
            listenForCalls();

            myPeer.on('connection', (conn) => {
                hostDataConnections.push(conn); 

                conn.on('data', (data) => {
                    if (data.type === 'join') {
                        conn.send({ type: 'peer-list', peers: roomClients });
                        roomClients.push({ id: data.id, nick: data.nick });
                        systemMessage(`[+] ${data.nick} odaya katıldı.`);
                    }
                    if (data.type === 'chat') {
                        appendChatMessage(data.sender, data.text);
                        broadcastChat(data, conn.peer);
                    }
                });

                conn.on('close', () => {
                    hostDataConnections = hostDataConnections.filter(c => c.peer !== conn.peer);
                    roomClients = roomClients.filter(c => c.id !== conn.peer);
                });
            });
        }

        function broadcastChat(msgData, excludePeerId = null) {
            hostDataConnections.forEach(conn => {
                if (conn.peer !== excludePeerId) {
                    conn.send(msgData);
                }
            });
        }

        // --- ADIM 4: WEBRTC SES ---
        function listenForCalls() {
            myPeer.on('call', (call) => {
                call.answer(myStream);
                const callerNick = call.metadata ? call.metadata.nick : "BİLİNMEYEN_OYUNCU";
                handleStream(call, callerNick);
            });
        }

        function makeCall(peerId, targetNick) {
            const call = myPeer.call(peerId, myStream, { metadata: { nick: myNick } });
            handleStream(call, targetNick);
        }

        function handleStream(call, remoteNick) {
            if (peers[call.peer]) return;
            peers[call.peer] = call;

            call.on('stream', (remoteStream) => {
                if (document.getElementById(`audio-${call.peer}`)) return;
                
                const audio = document.createElement('audio');
                audio.id = `audio-${call.peer}`;
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                document.body.appendChild(audio);

                addVoiceBox(call.peer, remoteNick);
            });

            call.peerConnection.oniceconnectionstatechange = function() {
                if(call.peerConnection.iceConnectionState == 'disconnected' ||
                   call.peerConnection.iceConnectionState == 'failed' ||
                   call.peerConnection.iceConnectionState == 'closed') {
                    removeVoiceBox(call.peer);
                    delete peers[call.peer];
                    if(isHost) systemMessage(`[-] ${remoteNick} odadan ayrıldı.`);
                }
            };

            call.on('close', () => {
                removeVoiceBox(call.peer);
                delete peers[call.peer];
            });
        }

        // --- ADIM 5: YAZILI SOHBET ---
        function sendChatMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            const msgData = { type: 'chat', sender: myNick, text: text };
            
            appendChatMessage('SEN', text, true);

            if (isHost) {
                broadcastChat(msgData); 
            } else {
                if (myHostDataConnection && myHostDataConnection.open) {
                    myHostDataConnection.send(msgData); 
                }
            }

            chatInput.value = '';
            chatInput.focus();
        }

        function systemMessage(text) {
            const div = document.createElement('div');
            div.className = "text-[#b026ff] text-xs opacity-90 mb-1 font-mono uppercase tracking-wider drop-shadow-[0_0_3px_#b026ff]";
            div.innerText = `> ${text}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendChatMessage(sender, text, isMe = false) {
            const div = document.createElement('div');
            div.className = "flex flex-col animate-fade-in";
            
            if (isMe) {
                div.innerHTML = `
                    <div class="self-end max-w-[85%]">
                        <span class="block text-[11px] text-[#b026ff] font-bold mb-1 uppercase tracking-widest text-right drop-shadow-[0_0_2px_#b026ff]">${sender}</span>
                        <div class="bg-gradient-to-br from-[#b026ff]/20 to-transparent border border-[#b026ff]/50 text-white px-5 py-3 rounded-2xl rounded-tr-sm break-words font-medium shadow-[0_0_10px_rgba(176,38,255,0.2)]">
                            ${text}
                        </div>
                    </div>`;
            } else {
                div.innerHTML = `
                    <div class="self-start max-w-[85%]">
                        <span class="block text-[11px] text-[#00f3ff] font-bold mb-1 uppercase tracking-widest drop-shadow-[0_0_2px_#00f3ff]">${sender}</span>
                        <div class="bg-gradient-to-br from-[#00f3ff]/20 to-transparent border border-[#00f3ff]/50 text-white px-5 py-3 rounded-2xl rounded-tl-sm break-words font-medium shadow-[0_0_10px_rgba(0,243,255,0.2)]">
                            ${text}
                        </div>
                    </div>`;
            }

            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatSendBtn.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        // --- ADIM 6: UI GÜNCELLEMELERİ VE EKLENTİLER ---
        function setupUI() {
            loginScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
            document.getElementById('display-nick').innerText = myNick.toUpperCase() + (isHost ? " [KURUCU]" : "");
            
            const rawRoomInput = document.getElementById('room-input').value.trim();
            document.getElementById('display-room').innerText = `ODA: ${rawRoomInput.toUpperCase()}`;
            
            addUserToList('self', myNick, true);
        }

        function addVoiceBox(id, nick) {
            emptyState.classList.add('hidden');
            
            const box = document.createElement('div');
            box.id = `box-${id}`;
            box.className = "bg-[#05010a]/80 border-2 border-[#ff0055] rounded-2xl p-6 flex flex-col items-center justify-center gap-4 relative overflow-hidden group shadow-[0_0_20px_rgba(255,0,85,0.3)] hover:shadow-[0_0_30px_rgba(176,38,255,0.5)] transition-all hover:border-[#b026ff]";
            
            box.innerHTML = `
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#00f3ff] to-[#b026ff]"></div>
                
                <div class="text-5xl text-[#ff0055] group-hover:text-[#b026ff] transition-colors drop-shadow-[0_0_10px_rgba(255,0,85,0.8)] group-hover:drop-shadow-[0_0_15px_rgba(176,38,255,0.8)]">🎧</div>
                <div class="cyber-font text-[12px] text-white tracking-widest text-center z-10 font-bold">${nick}</div>
                
                <div class="flex gap-1.5 items-end h-5 mt-2">
                    <div class="w-1.5 bg-[#00f3ff] rounded-t-sm animate-pulse shadow-[0_0_5px_#00f3ff]" style="height: 40%"></div>
                    <div class="w-1.5 bg-[#b026ff] rounded-t-sm animate-pulse shadow-[0_0_5px_#b026ff]" style="height: 100%; animation-delay: 0.2s"></div>
                    <div class="w-1.5 bg-[#ff0055] rounded-t-sm animate-pulse shadow-[0_0_5px_#ff0055]" style="height: 60%; animation-delay: 0.4s"></div>
                </div>
            `;
            voiceGridUI.appendChild(box);
            addUserToList(id, nick, false);
        }

        function removeVoiceBox(id) {
            document.getElementById(`audio-${id}`)?.remove();
            document.getElementById(`box-${id}`)?.remove();
            document.getElementById(`li-${id}`)?.remove();
            
            if(Object.keys(peers).length === 0) emptyState.classList.remove('hidden');
        }

        function addUserToList(id, nick, isMe) {
            if (document.getElementById(`li-${id}`)) return;
            const li = document.createElement('li');
            li.id = `li-${id}`;
            li.className = "flex items-center justify-between bg-[#05010a]/80 p-3 rounded-lg border border-[#00f3ff]/20";
            li.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-[18px] drop-shadow-[0_0_5px_rgba(255,255,255,0.5)]">${isMe ? '⭐' : '👾'}</span>
                    <span class="text-[#b026ff] font-bold text-sm uppercase">${nick}</span>
                </div>
                <div class="online-dot ${isMe ? 'bg-[#00f3ff] shadow-[0_0_10px_#00f3ff]' : 'bg-[#ff0055] shadow-[0_0_10px_#ff0055]'}"></div>
            `;
            userListUI.appendChild(li);
        }

        // Davet Linkini Kopyalama Kontrolü
        shareBtn.onclick = () => {
            const rawRoom = document.getElementById('room-input').value.trim();
            const baseUrl = window.location.origin + window.location.pathname;
            const inviteLink = `${baseUrl}?room=${encodeURIComponent(rawRoom)}`;
            
            const tempInput = document.createElement('input');
            tempInput.value = inviteLink;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);

            const icon = document.getElementById('share-icon');
            icon.innerText = '✅';
            systemMessage("SİSTEM: Davet linki panoya kopyalandı! Arkadaşlarına gönderebilirsin.");
            
            setTimeout(() => { icon.innerText = '🔗'; }, 3000);
        };

        // YENİ: Dipses (Gürültü Engelleme) Filtresi Kontrolü
        noiseFilterBtn.onclick = async () => {
            if (!myStream) return;
            
            isNoiseFilterActive = !isNoiseFilterActive;
            const track = myStream.getAudioTracks()[0];
            
            try {
                // Tarayıcıya filtreleri canlı canlı kapatıp açmasını söylüyoruz
                await track.applyConstraints({
                    noiseSuppression: isNoiseFilterActive,
                    echoCancellation: isNoiseFilterActive,
                    autoGainControl: isNoiseFilterActive
                });
                
                if (isNoiseFilterActive) {
                    noiseFilterBtn.classList.replace('border-red-500/80', 'border-[#00f3ff]/50');
                    noiseFilterBtn.classList.replace('text-red-500', 'text-[#00f3ff]');
                    noiseFilterBtn.classList.replace('hover:bg-red-500/20', 'hover:bg-[#00f3ff]/20');
                    noiseFilterBtn.classList.replace('shadow-[0_0_10px_rgba(239,68,68,0.4)]', 'shadow-[0_0_10px_rgba(0,243,255,0.2)]');
                    noiseIndicator.classList.remove('hidden');
                    noiseFilterBtn.title = "Dipses Filtresi (Açık)";
                    systemMessage("SİSTEM: Dipses filtresi AKTİF. Arka plan gürültüsü engelleniyor.");
                } else {
                    noiseFilterBtn.classList.replace('border-[#00f3ff]/50', 'border-red-500/80');
                    noiseFilterBtn.classList.replace('text-[#00f3ff]', 'text-red-500');
                    noiseFilterBtn.classList.replace('hover:bg-[#00f3ff]/20', 'hover:bg-red-500/20');
                    noiseFilterBtn.classList.replace('shadow-[0_0_10px_rgba(0,243,255,0.2)]', 'shadow-[0_0_10px_rgba(239,68,68,0.4)]');
                    noiseIndicator.classList.add('hidden');
                    noiseFilterBtn.title = "Dipses Filtresi (Kapalı)";
                    systemMessage("SİSTEM: Dipses filtresi KAPATILDI. Mikrofon ham (raw) ses alıyor.");
                }
            } catch (e) {
                systemMessage("HATA: Filtre durumu değiştirilemedi. Tarayıcınız bunu canlı olarak desteklemiyor olabilir.");
            }
        };

        // Mikrofon Kontrolü (Susturma)
        muteBtn.onclick = () => {
            isMuted = !isMuted;
            myStream.getAudioTracks()[0].enabled = !isMuted;
            
            if(isMuted) {
                muteBtn.classList.replace('border-[#00f3ff]/50', 'border-red-500/80');
                muteBtn.classList.replace('hover:bg-[#00f3ff]/20', 'hover:bg-red-500/20');
                muteBtn.classList.replace('text-[#00f3ff]', 'text-red-500');
                muteBtn.classList.replace('shadow-[0_0_10px_rgba(0,243,255,0.2)]', 'shadow-[0_0_10px_rgba(239,68,68,0.4)]');
                muteBtn.innerHTML = '<span class="text-2xl">🔇</span>';
            } else {
                muteBtn.classList.replace('border-red-500/80', 'border-[#00f3ff]/50');
                muteBtn.classList.replace('hover:bg-red-500/20', 'hover:bg-[#00f3ff]/20');
                muteBtn.classList.replace('text-red-500', 'text-[#00f3ff]');
                muteBtn.classList.replace('shadow-[0_0_10px_rgba(239,68,68,0.4)]', 'shadow-[0_0_10px_rgba(0,243,255,0.2)]');
                muteBtn.innerHTML = '<span class="text-2xl">🎙️</span>';
            }
        };
    </script>
</body>
</html>
